<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="css/popup.css" />
  </head>
  <body>
    <div class="header">
      <div class="header-brand">
        <img
          src="images/txst-star-gold.png"
          alt="TXST"
          class="header-logo"
        />
        <h1>Bobcat Plus</h1>
      </div>
    </div>
    <div class="content">
      <div class="student-info" id="studentInfo">
        <div class="loading">Loading...</div>
      </div>
      <select class="term-select" id="termSelect"></select>
      <div class="mini-calendar" id="miniCalendar">
        <div class="no-schedule">Select a term to view schedule</div>
      </div>
      <button class="plan-btn" id="planBtn">Plan Semester</button>
    </div>
    <script src="courseColors.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
